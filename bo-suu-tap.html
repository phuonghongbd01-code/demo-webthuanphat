<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Sưu Tập | Thuận Phát</title>
    <meta name="description"
        content="Khám phá bộ sưu tập nội thất gỗ óc chó thượng lưu và các xu hướng thiết kế nội thất mới nhất năm 2026 từ Thuận Phát.">
    <meta property="og:title" content="Bộ Sưu Tập | Thuận Phát">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">


    <link rel="stylesheet" href="css/suu-tap.css">
    <link rel="stylesheet" href="css/footer.css">
</head>

<body>

    <!-- Header (Đồng bộ 100% hệ thống) -->
    <div id="header-placeholder"></div>

    <main>

        <!-- 1. Hero Section (Full-Width, Full-Height) -->
         <section class="page-banner" style="background-image: url('images/hero-bg.png');">
            <div class="page-banner-overlay"></div>
            <div class="container page-banner-content" data-aos="fade-up">
                <div class="breadcrumbs">
                    <a href="index.html">GIỚI THIỆU</a> / <span>BỘ SƯU TẬP</span>
                </div>
                <h1 class="page-title">BỘ SƯU TẬP</h1>
            </div>
            <a href="#showcase-section" class="scroll-down-btn">
                <i class="fa-solid fa-chevron-down"></i>
            </a>
        </section>

        <!-- 2. Section: Slider Full-Width có điểm chạm Hotspots động -->
        <section class="bst-showcase" id="showcase-section">
            <div class="container">
                <h2 class="bst-showcase-title" data-aos="fade-up">KHÔNG GIAN SỐNG <span>THƯỢNG LƯU</span></h2>

                <div class="bst-slider-wrapper" data-aos="fade-up">

                    <!-- Slide 1: Phòng khách Luxury (Ảnh nền Unsplash gỗ óc chó tối sang) -->
                    <div class="bst-slide active"
                        style="background-image: url('https://images.unsplash.com/photo-1618219908412-a29a1bb7b86e?auto=format&fit=crop&w=1600&q=80');">
                        <div class="bst-slide-overlay"></div>

                        <!-- Hotspot 1: Sofa Da Bò Ý -->
                        <div class="bst-hotspot" style="top: 60%; left: 45%;">
                            <div class="bst-hotspot-circle"></div>
                            <div class="bst-hotspot-tooltip">Sofa Da Bò Ý Nhập Khẩu</div>
                        </div>

                        <!-- Hotspot 2: Bàn Trà Nu Gỗ -->
                        <div class="bst-hotspot" style="top: 72%; left: 52%;">
                            <div class="bst-hotspot-circle"></div>
                            <div class="bst-hotspot-tooltip">Bàn Trà Nu Gỗ Óc Chó Độc Bản</div>
                        </div>

                        <!-- Hotspot 3: Vách Đá Onyx -->
                        <div class="bst-hotspot" style="top: 40%; left: 32%;">
                            <div class="bst-hotspot-circle"></div>
                            <div class="bst-hotspot-tooltip">Vách Đá Tự Nhiên Onyx</div>
                        </div>

                        <!-- Hotspot 4: Sofa Băng Nhỏ -->
                        <div class="bst-hotspot" style="top: 58%; left: 72%;">
                            <div class="bst-hotspot-circle"></div>
                            <div class="bst-hotspot-tooltip">Sofa Đơn Gỗ Óc Chó</div>
                        </div>
                    </div>

                    <!-- Slide 2: Phòng ăn Luxury (Ảnh nền Unsplash bếp gỗ óc chó cao cấp) -->
                    <div class="bst-slide"
                        style="background-image: url('https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&w=1600&q=80');">
                        <div class="bst-slide-overlay"></div>

                        <!-- Hotspot 1: Bàn ăn 10 Ghế -->
                        <div class="bst-hotspot" style="top: 65%; left: 45%;">
                            <div class="bst-hotspot-circle"></div>
                            <div class="bst-hotspot-tooltip">Bàn Ăn Gỗ Óc Chó 10 Ghế</div>
                        </div>

                        <!-- Hotspot 2: Tủ bếp gỗ óc chó -->
                        <div class="bst-hotspot" style="top: 38%; left: 35%;">
                            <div class="bst-hotspot-circle"></div>
                            <div class="bst-hotspot-tooltip">Hệ Tủ Bếp Thông Minh Óc Chó</div>
                        </div>

                        <!-- Hotspot 3: Piano Đen -->
                        <div class="bst-hotspot" style="top: 52%; left: 22%;">
                            <div class="bst-hotspot-circle"></div>
                            <div class="bst-hotspot-tooltip">Đàn Piano Grand Steinway & Sons</div>
                        </div>

                        <!-- Hotspot 4: Đèn chùm thả trần -->
                        <div class="bst-hotspot" style="top: 15%; left: 55%;">
                            <div class="bst-hotspot-circle"></div>
                            <div class="bst-hotspot-tooltip">Đèn Chùm Pha Lê Thả Trần</div>
                        </div>
                    </div>

                    <!-- Mũi tên điều hướng -->
                    <button class="bst-slider-btn prev" id="sliderPrevBtn"><i
                            class="fa-solid fa-chevron-left"></i></button>
                    <button class="bst-slider-btn next" id="sliderNextBtn"><i
                            class="fa-solid fa-chevron-right"></i></button>

                    <!-- Chỉ chỉ báo trang ở góc trái -->
                    <div class="bst-slider-dots">
                        <div class="bst-dot active" data-index="0"></div>
                        <div class="bst-dot" data-index="1"></div>
                    </div>

                </div>
            </div>
        </section>

        <!-- 3. Section: Xu Hướng Thiết Kế Nội Thất 2026 (Bộ lọc tương tác) -->
        <section class="bst-trends">
            <div class="container">
                <div class="trends-header" data-aos="fade-up">
                    <h2 class="trends-title">XU HƯỚNG THIẾT KẾ NỘI THẤT 2026</h2>

                    <div class="trends-filters">
                        <button class="trends-filter-btn active" data-filter="all">TẤT CẢ</button>
                        <button class="trends-filter-btn" data-filter="ban">BÀN</button>
                        <button class="trends-filter-btn" data-filter="giuong-nam">GIƯỜNG NẰM</button>
                        <button class="trends-filter-btn" data-filter="sofa">SOFA</button>
                        <button class="trends-filter-btn" data-filter="tu-ke">TỦ – KỆ</button>
                    </div>
                </div>

                <!-- Lưới 8 Card xu hướng cao cấp -->
                <div class="trends-grid" id="trendsGrid" data-aos="fade-up">
                    <!-- Javascript tự động kết xuất dữ liệu bộ sưu tập -->
                </div>
            </div>
        </section>



    </main>

    <!-- Footer (Đồng bộ 100% hệ thống) -->
    <div id="footer-placeholder"></div>

    <!-- AOS & main.js -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/layout.js"></script>



    <!-- Script Slider 2 Ảnh Full-Width -->


    <!-- Script Lưới xu hướng thiết kế 2026 (Bộ lọc) -->

    <script src="js/suu-tap.js"></script>
</body>

</html>
