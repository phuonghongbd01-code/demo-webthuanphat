<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Giá Kiến Trúc & Xây Dựng | Thuận Phát</title>
    <meta name="description"
        content="Bảng báo giá các dịch vụ kiến trúc và xây dựng cao cấp tại Thuận Phát.">

    <meta property="og:title" content="Báo Giá Kiến Trúc & Xây Dựng | Thuận Phát">
    <meta property="og:description"
        content="Bảng báo giá chi tiết các dịch vụ kiến trúc và xây dựng cao cấp tại Thuận Phát.">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/du-an.css"> <!-- Tái sử dụng CSS từ trang dự án cho banner -->
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/bao-gia.css">
</head>

<body class="bao-gia-page">

    <!-- Header -->
    <div id="header-placeholder"></div>

    <main>
        <section class="page-banner" style="background-image: url('images/project_1.png');">
            <div class="page-banner-overlay"></div>
            <div class="container page-banner-content" data-aos="fade-up">
                <div class="breadcrumbs">
                    <a href="index.html">TRANG CHỦ</a> / <a href="gioi-thieu-ktxd.html">KIẾN TRÚC & XÂY DỰNG</a> / <span>BÁO GIÁ</span>
                </div>
                <h1 class="page-title">BÁO GIÁ KIẾN TRÚC & XÂY DỰNG</h1>
            </div>
            <!-- Nút mũi tên cuộn xuống -->
            <a href="#noi-dung-tra-gia" class="scroll-down-btn">
                <i class="fa-solid fa-chevron-down"></i>
            </a>
        </section>

        <section class="pricing-page-content" id="noi-dung-tra-gia">
            <div class="container">
                <!-- SECTION: TRA GIÁ -->
                <div id="tra-gia" class="section-container">
                    <h3 class="section-title-underline">TRA GIÁ THEO NHU CẦU</h3>
                    <div class="form-group">
                        <label for="service-type">Chọn dịch vụ cần tra giá:</label>
                        <select id="service-type" onchange="toggleForm()">
                            <option value="">-- Vui lòng chọn --</option>
                            <option value="thiet-ke">Thiết kế kiến trúc</option>
                            <option value="thi-cong">Xây dựng trọn gói</option>
                        </select>
                    </div>

                    <div id="form-thiet-ke" style="display: none;">
                        <div class="form-group"><label for="area">Diện tích (m2):</label><input type="number"
                                id="area" placeholder="Nhập số m2 (VD: 100)"></div>
                        <div class="form-group"><label for="style">Phong cách thiết kế:</label><select id="style">
                                <option value="150000">Tối giản (150k/m2)</option>
                                <option value="180000">Hiện đại (180k/m2)</option>
                                <option value="200000">Bắc Âu (200k/m2)</option>
                                <option value="250000">Tân cổ điển (250k/m2)</option>
                                <option value="280000">Hiện Đại Sang Trọng (280k/m2)</option>
                                <option value="300000">Cổ điển (300k/m2)</option>
                                <option value="350000">Indochine (350k/m2)</option>
                                <option value="400000">Luxury (400k/m2)</option>
                            </select></div>
                        <button class="btn-more" onclick="calculatePrice()">Tra giá</button>
                        <div id="result-tk" class="result-box"></div>
                    </div>

                    <div id="form-thi-cong" style="display: none;">
                        <div class="form-group"><label for="package-type">Chọn gói thi công:</label><select
                                id="package-type">
                                <option value="pdf_300m.pdf">Gói 300 triệu</option>
                                <option value="pdf_400m.pdf">Gói 400 triệu</option>
                                <option value="pdf_500m.pdf">Gói 500 triệu</option>
                            </select></div>
                        <button class="btn-more" onclick="openPackagePDF()">Tra giá</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/bao-gia.js"></script>

</body>

</html>
